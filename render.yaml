services:
  - type: web
    name: virtualboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: boardai-db
          property: connectionURI

databases:
  - name: boardai-db
    plan: free
    region: virginia

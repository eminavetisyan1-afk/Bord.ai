<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Виртуальный Борд</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-2: #1a1a25;
  --border: #2a2a3a;
  --text: #e4e4ed;
  --text-dim: #8888a0;
  --accent: #818cf8;
  --accent-glow: rgba(129,140,248,.15);
  --violet: #a78bfa;
  --violet-glow: rgba(167,139,250,.12);
  --danger: #ef4444;
  --success: #34d399;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,.85);
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
}

.logo span { opacity: .6; }

.btn-history {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  transition: all .2s;
}
.btn-history:hover { border-color: var(--accent); color: var(--text); }

/* ── Main container ── */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* ── Section titles ── */
.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
}

/* ── Mode selector ── */
.modes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 32px;
}

.mode-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 14px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  transition: all .2s;
  position: relative;
}
.mode-btn:hover { border-color: var(--accent); color: var(--text); }
.mode-btn.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
  box-shadow: 0 0 20px rgba(129,140,248,.08);
}
.mode-btn .mode-label { display: block; font-weight: 600; margin-bottom: 4px; }
.mode-btn .mode-desc {
  display: block;
  font-size: 11px;
  opacity: .6;
  font-weight: 400;
}

/* ── Agent grid ── */
.agents-section { margin-bottom: 32px; }

.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.preset-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  transition: all .2s;
}
.preset-btn:hover { border-color: var(--accent); color: var(--text); }

.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}

.agent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.agent-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.agent-card.selected {
  border-color: var(--accent);
  background: var(--accent-glow);
  box-shadow: 0 0 16px rgba(129,140,248,.06);
}
.agent-card .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.agent-card .name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  display: block;
  margin-bottom: 2px;
}
.agent-card .role {
  font-size: 10px;
  color: var(--text-dim);
  display: block;
}

.agents-actions {
  display: flex;
  gap: 8px;
}
.agents-actions button {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  padding: 4px 0;
}
.agents-actions button:hover { color: var(--accent); }

/* ── Question input ── */
.question-section { margin-bottom: 32px; }

.question-wrap {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px;
  transition: border-color .2s;
}
.question-wrap:focus-within { border-color: var(--accent); }

.question-wrap textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  padding: 16px;
  resize: vertical;
  min-height: 100px;
  max-height: 300px;
  outline: none;
  line-height: 1.6;
}
.question-wrap textarea::placeholder { color: var(--text-dim); }

.question-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px 12px;
}

.char-count {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}

.btn-submit {
  background: var(--accent);
  color: #0a0a0f;
  border: none;
  padding: 10px 28px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .2s;
}
.btn-submit:hover { opacity: .9; transform: translateY(-1px); }
.btn-submit:disabled {
  opacity: .4;
  cursor: not-allowed;
  transform: none;
}

/* ── Response area ── */
.responses-area { display: none; }
.responses-area.visible { display: block; }

.round-divider {
  text-align: center;
  padding: 20px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

.agent-response {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
  animation: fadeIn .3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.agent-response-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.agent-response-header .emoji { font-size: 22px; }

.agent-response-header .info { flex: 1; }
.agent-response-header .info .name {
  font-size: 14px;
  font-weight: 600;
}
.agent-response-header .info .role {
  font-size: 11px;
  color: var(--text-dim);
}

.agent-response-header .thinking {
  width: 18px;
  height: 18px;
  border: 2px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.agent-response-body {
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* ── Orchestrator block ── */
.synthesis-block {
  background: linear-gradient(135deg, rgba(167,139,250,.06), rgba(129,140,248,.04));
  border: 1px solid rgba(167,139,250,.25);
  border-radius: 14px;
  margin-top: 24px;
  overflow: hidden;
  animation: fadeIn .4s ease;
}

.synthesis-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(167,139,250,.15);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--violet);
  letter-spacing: 1px;
}

.synthesis-body {
  padding: 20px;
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.synthesis-body strong { color: var(--violet); }

/* ── History sidebar ── */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
}
.sidebar-overlay.open { display: block; }

.sidebar {
  position: fixed;
  top: 0;
  right: -420px;
  width: 400px;
  max-width: 90vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 201;
  transition: right .3s ease;
  overflow-y: auto;
  padding: 24px;
}
.sidebar.open { right: 0; }

.sidebar-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
  line-height: 1;
}
.sidebar-close:hover { color: var(--text); }

.session-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s;
}
.session-card:hover { border-color: var(--accent); }

.session-card .meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.session-card .meta .date {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}
.session-card .meta .mode-tag {
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.session-card .question-preview {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}
.session-card .actions { margin-top: 8px; text-align: right; }
.session-card .btn-delete {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.session-card .btn-delete:hover { color: var(--danger); }

/* ── Session detail modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 300;
  overflow-y: auto;
  padding: 40px 20px;
}
.modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  max-width: 800px;
  width: 100%;
  padding: 28px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 20px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 24px;
  cursor: pointer;
}
.modal-close:hover { color: var(--text); }

.modal h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--accent);
  margin-bottom: 8px;
}
.modal .modal-meta {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.modal .modal-content {
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; display: block; }
.empty-state p { font-size: 14px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .header { padding: 14px 16px; }
  .container { padding: 20px 14px; }
  .modes { grid-template-columns: repeat(2, 1fr); }
  .agents-grid { grid-template-columns: repeat(3, 1fr); }
  .mode-btn .mode-desc { display: none; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">⬡ <span>ВИРТУАЛЬНЫЙ БОРД</span></div>
  <button class="btn-history" onclick="toggleSidebar()">История сессий</button>
</div>

<!-- Main -->
<div class="container">

  <!-- Mode selector -->
  <div class="section-title">Режим</div>
  <div class="modes" id="modes"></div>

  <!-- Agent grid -->
  <div class="agents-section" id="agents-section">
    <div class="section-title">Участники борда</div>
    <div class="presets" id="presets"></div>
    <div class="agents-grid" id="agents-grid"></div>
    <div class="agents-actions">
      <button onclick="selectAllAgents()">Выбрать всех</button>
      <button onclick="clearAgents()">Сбросить</button>
    </div>
  </div>

  <!-- Question -->
  <div class="question-section">
    <div class="section-title">Вопрос</div>
    <div class="question-wrap">
      <textarea id="question" placeholder="Задай вопрос своему борду..." maxlength="2000" rows="3"></textarea>
      <div class="question-footer">
        <span class="char-count"><span id="char-count">0</span> / 2000</span>
        <button class="btn-submit" id="btn-submit" onclick="submitBoard()">СОЗВАТЬ БОРД →</button>
      </div>
    </div>
  </div>

  <!-- Responses -->
  <div class="responses-area" id="responses-area">
    <div id="responses-container"></div>
  </div>

</div>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-title">
    История сессий
    <button class="sidebar-close" onclick="toggleSidebar()">×</button>
  </div>
  <div id="sessions-list"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── State ──
let agents = [];
let selectedAgents = new Set();
let selectedMode = 'panel';
let presets = {};
let isRunning = false;

const MODES = [
  { id: 'solo',             label: 'Соло',              desc: 'Вопрос одному члену борда' },
  { id: 'panel',            label: 'Панель',            desc: '3–5 голосов под задачу' },
  { id: 'fullboard',        label: 'Полный борд',       desc: 'Все 15 агентов' },
  { id: 'devils_advocate',  label: 'Адвокат дьявола',   desc: 'Стресс-тест идеи' },
  { id: 'premortem',        label: 'Пре-мортем',        desc: 'Разбор провала' },
  { id: 'quarterly',        label: 'Квартальный ревью', desc: 'Оценка за период' },
];

const PRESET_LABELS = {
  product: 'Продукт', tech: 'Технологии', fundraising: 'Фандрейзинг',
  crisis: 'Кризис', ai_strategy: 'AI-стратегия', discipline: 'Дисциплина',
  management: 'Менеджмент', personal: 'Личное',
};

const MODE_LABELS = {
  solo: 'Соло', panel: 'Панель', fullboard: 'Полный борд',
  devils_advocate: 'Адвокат дьявола', premortem: 'Пре-мортем', quarterly: 'Квартальный ревью',
};

// ── Init ──
async function init() {
  const [agentsRes, presetsRes] = await Promise.all([
    fetch('/agents').then(r => r.json()),
    fetch('/presets').then(r => r.json()),
  ]);
  agents = agentsRes;
  presets = presetsRes;
  renderModes();
  renderPresets();
  renderAgents();
  setupTextarea();
}

// ── Render modes ──
function renderModes() {
  const el = document.getElementById('modes');
  el.innerHTML = MODES.map(m => `
    <button class="mode-btn ${m.id === selectedMode ? 'active' : ''}" data-mode="${m.id}" onclick="selectMode('${m.id}')">
      <span class="mode-label">${m.label}</span>
      <span class="mode-desc">${m.desc}</span>
    </button>
  `).join('');
}

function selectMode(mode) {
  selectedMode = mode;
  renderModes();
  // Hide agent selection for quarterly/fullboard
  const sec = document.getElementById('agents-section');
  sec.style.display = (mode === 'quarterly' || mode === 'fullboard') ? 'none' : '';
}

// ── Render presets ──
function renderPresets() {
  const el = document.getElementById('presets');
  el.innerHTML = Object.entries(presets)
    .filter(([k]) => PRESET_LABELS[k])
    .map(([k]) => `<button class="preset-btn" onclick="applyPreset('${k}')">${PRESET_LABELS[k]}</button>`)
    .join('');
}

function applyPreset(key) {
  selectedAgents = new Set(presets[key] || []);
  renderAgents();
}

// ── Render agents ──
function renderAgents() {
  const el = document.getElementById('agents-grid');
  el.innerHTML = agents.map(a => `
    <div class="agent-card ${selectedAgents.has(a.id) ? 'selected' : ''}"
         onclick="toggleAgent('${a.id}')"
         style="${selectedAgents.has(a.id) ? `border-color:${a.color}; background:${a.bg}` : ''}">
      <span class="emoji">${a.emoji}</span>
      <span class="name" style="${selectedAgents.has(a.id) ? `color:${a.color}` : ''}">${a.name}</span>
      <span class="role">${a.role}</span>
    </div>
  `).join('');
}

function toggleAgent(id) {
  if (selectedAgents.has(id)) selectedAgents.delete(id);
  else selectedAgents.add(id);
  renderAgents();
}

function selectAllAgents() {
  agents.forEach(a => selectedAgents.add(a.id));
  renderAgents();
}

function clearAgents() {
  selectedAgents.clear();
  renderAgents();
}

// ── Textarea ──
function setupTextarea() {
  const ta = document.getElementById('question');
  const cc = document.getElementById('char-count');
  ta.addEventListener('input', () => { cc.textContent = ta.value.length; });
}

// ── Submit ──
async function submitBoard() {
  if (isRunning) return;
  const question = document.getElementById('question').value.trim();
  if (!question) return;

  const agentsList = selectedMode === 'fullboard' || selectedMode === 'quarterly'
    ? agents.map(a => a.id)
    : [...selectedAgents];

  if (selectedMode !== 'quarterly' && selectedMode !== 'fullboard' && agentsList.length === 0) {
    alert('Выберите хотя бы одного агента');
    return;
  }

  isRunning = true;
  document.getElementById('btn-submit').disabled = true;

  const area = document.getElementById('responses-area');
  const container = document.getElementById('responses-container');
  area.classList.add('visible');
  container.innerHTML = '';

  // Track current round
  let currentRound = 0;
  const agentElements = {};
  let synthesisEl = null;

  try {
    const res = await fetch('/board', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, mode: selectedMode, agents: agentsList }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }
        handleEvent(event);
      }
    }

    // Process remaining buffer
    if (buffer.startsWith('data: ')) {
      try {
        handleEvent(JSON.parse(buffer.slice(6)));
      } catch {}
    }

  } catch (err) {
    container.innerHTML += `<div style="color:var(--danger);padding:20px;">Ошибка: ${err.message}</div>`;
  }

  isRunning = false;
  document.getElementById('btn-submit').disabled = false;

  function handleEvent(ev) {
    switch (ev.type) {
      case 'agent_start': {
        const round = ev.round || 1;
        if (round !== currentRound) {
          currentRound = round;
          const label = round === 1 ? '── Раунд 1: Позиции ──' : '── Раунд 2: Дискуссия ──';
          container.innerHTML += `<div class="round-divider">${label}</div>`;
        }
        const agent = agents.find(a => a.id === ev.agent_id) || { emoji: '🤖', color: '#818cf8', name: ev.name, role: '' };
        const key = `${ev.agent_id}_r${round}`;
        const div = document.createElement('div');
        div.className = 'agent-response';
        div.id = `resp-${key}`;
        div.innerHTML = `
          <div class="agent-response-header">
            <span class="emoji">${agent.emoji}</span>
            <div class="info">
              <div class="name" style="color:${agent.color}">${agent.name || ev.name}</div>
              <div class="role">${agent.role}</div>
            </div>
            <div class="thinking" id="think-${key}"></div>
          </div>
          <div class="agent-response-body" id="body-${key}"></div>
        `;
        container.appendChild(div);
        agentElements[key] = document.getElementById(`body-${key}`);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        break;
      }
      case 'token': {
        const key = `${ev.agent_id}_r${ev.round || 1}`;
        if (agentElements[key]) agentElements[key].textContent += ev.content;
        break;
      }
      case 'agent_done': {
        const key = `${ev.agent_id}_r${ev.round || 1}`;
        const spinner = document.getElementById(`think-${key}`);
        if (spinner) spinner.remove();
        break;
      }
      case 'round_complete':
        break;
      case 'synthesis_start': {
        const div = document.createElement('div');
        div.className = 'synthesis-block';
        div.innerHTML = `
          <div class="synthesis-header">
            ⬡ СИНТЕЗ ОРКЕСТРАТОРА
            <div class="thinking" id="think-synthesis"></div>
          </div>
          <div class="synthesis-body" id="synthesis-body"></div>
        `;
        container.appendChild(div);
        synthesisEl = document.getElementById('synthesis-body');
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        break;
      }
      case 'synthesis_token':
        if (synthesisEl) synthesisEl.textContent += ev.content;
        break;
      case 'done': {
        const spinner = document.getElementById('think-synthesis');
        if (spinner) spinner.remove();
        // Format synthesis sections as bold
        if (synthesisEl) {
          let html = synthesisEl.textContent;
          const keywords = ['БОРД РАССМОТРЕЛ', 'КОНСЕНСУС', 'ГЛАВНОЕ РАЗНОГЛАСИЕ',
            'ОДИНОКИЙ ГОЛОС', 'ВОПРОСЫ ПЕРЕД РЕШЕНИЕМ', 'РЕКОМЕНДАЦИЯ БОРДА', 'ТОП-3 РИСКА',
            'Лагерь А', 'Лагерь Б', 'СОСТАВ'];
          keywords.forEach(kw => {
            html = html.replace(new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}[^\\n]*)`, 'g'), '<strong>$1</strong>');
          });
          html = html.replace(/────+/g, '<span style="color:var(--violet);opacity:.4">────────────────────────────────────</span>');
          synthesisEl.innerHTML = html;
        }
        break;
      }
      case 'error':
        container.innerHTML += `<div style="color:var(--danger);padding:16px;background:var(--surface);border-radius:10px;margin:10px 0;">⚠ ${ev.message}</div>`;
        break;
    }
  }
}

// ── Sidebar ──
function toggleSidebar() {
  const overlay = document.getElementById('sidebar-overlay');
  const sidebar = document.getElementById('sidebar');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) {
    overlay.classList.remove('open');
    sidebar.classList.remove('open');
  } else {
    overlay.classList.add('open');
    sidebar.classList.add('open');
    loadSessions();
  }
}

async function loadSessions() {
  const list = document.getElementById('sessions-list');
  try {
    const sessions = await fetch('/sessions').then(r => r.json());
    if (!sessions.length) {
      list.innerHTML = '<div class="empty-state"><span class="icon">📭</span><p>Нет сохранённых сессий</p></div>';
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div class="session-card" onclick="openSession('${s.id}')">
        <div class="meta">
          <span class="date">${new Date(s.ts).toLocaleString('ru-RU')}</span>
          <span class="mode-tag">${MODE_LABELS[s.mode] || s.mode}</span>
        </div>
        <div class="question-preview">${escapeHtml(s.question)}</div>
        <div class="actions">
          <button class="btn-delete" onclick="event.stopPropagation(); deleteSession('${s.id}')">Удалить</button>
        </div>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<p style="color:var(--text-dim);">Ошибка загрузки</p>';
  }
}

async function openSession(id) {
  try {
    const s = await fetch(`/sessions/${id}`).then(r => r.json());
    const body = document.getElementById('modal-body');

    let content = `<h2>${escapeHtml(s.question)}</h2>`;
    content += `<div class="modal-meta">${new Date(s.ts).toLocaleString('ru-RU')} · ${MODE_LABELS[s.mode] || s.mode}</div>`;

    if (s.responses) {
      for (const [aid, data] of Object.entries(s.responses)) {
        const agent = agents.find(a => a.id === aid);
        const name = agent ? `${agent.emoji} ${agent.name}` : aid;
        content += `<div style="margin-bottom:16px;">`;
        content += `<div style="font-weight:600;color:${agent?.color || 'var(--accent)'};margin-bottom:4px;">${name}</div>`;
        if (data.round1) content += `<div class="modal-content">${escapeHtml(data.round1)}</div>`;
        if (data.round2) content += `<div class="modal-content" style="margin-top:8px;padding-left:12px;border-left:2px solid var(--border);">${escapeHtml(data.round2)}</div>`;
        content += `</div>`;
      }
    }

    if (s.synthesis) {
      content += `<div style="margin-top:20px;padding:16px;background:var(--violet-glow);border:1px solid rgba(167,139,250,.2);border-radius:10px;">`;
      content += `<div style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--violet);margin-bottom:10px;">⬡ СИНТЕЗ</div>`;
      content += `<div class="modal-content">${escapeHtml(s.synthesis)}</div>`;
      content += `</div>`;
    }

    body.innerHTML = content;
    document.getElementById('modal-overlay').classList.add('open');
  } catch {
    alert('Ошибка загрузки сессии');
  }
}

async function deleteSession(id) {
  if (!confirm('Удалить сессию?')) return;
  try {
    await fetch(`/sessions/${id}`, { method: 'DELETE' });
    loadSessions();
  } catch {}
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ── Utils ──
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Start ──
init();
</script>
